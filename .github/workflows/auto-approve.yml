name: Auto-Approve PR

# 一人での開発環境向け: 明示的に opt-in した PR のみ自動承認
# 既定では承認しない（ラベル + actor 条件を満たした場合のみ実行）
# 注意: 承認は CI 成否とは独立して行われるため、
# ブランチ保護ルールで必須ステータスチェックを設定することが重要
on:
  pull_request:
    # ラベル付与時に明示的に承認フローを開始できるようにする
    types: [opened, synchronize, reopened, labeled]

# PR を承認するために必要な権限
# GitHub リポジトリ設定で "Allow GitHub Actions to create and approve pull requests" を
# 有効にする必要があります
permissions:
  pull-requests: write
  contents: read

jobs:
  auto-approve:
    name: Auto-Approve PR
    runs-on: ubuntu-latest
    # 明示的なガード条件:
    # 1) PR 作成者がリポジトリ owner 本人
    # 2) このイベントを発火させた actor も owner 本人
    # 3) draft PR は除外
    # 4) 同一リポジトリ内ブランチからの PR のみ（fork 由来を除外）
    # 5) `auto-approve` ラベルが付いた PR のみ（opt-in）
    if: >
      github.event.pull_request.user.login == github.repository_owner &&
      github.actor == github.repository_owner &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'auto-approve')
    # タイムアウト設定: 5分以上かかる場合は強制終了
    timeout-minutes: 5

    steps:
      # PR を自動承認
      # GitHub CLI (gh) を使用して承認を実行
      # 注意: この承認は CI の結果を待たずに実行されます
      # ブランチ保護ルールで必須ステータスチェックを設定することで、
      # CI が成功しない限りマージできないようにしてください
      - name: Approve PR
        run: |
          gh pr review --approve "$PR_URL" --body "✅ auto-approve ラベル付き PR を自動承認しました。CI が成功したらマージできます。"
          echo "✅ PR を自動承認しました"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
