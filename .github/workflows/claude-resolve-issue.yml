name: Claude Resolve Issue

# 自律開発パイプラインの中核ワークフロー
# 人間が Issue に claude:auto ラベルを付けると発火し、
# 調査 → 解決方針のコメント → 実装 → テスト → PR 作成までを自動で行う
#
# セキュリティ設計（ラベルゲート）:
# - Issue が「登録されただけ」では発火しない
# - 書き込み権限を持つ人間がラベルを付けることが承認行為になる
#   （外部からの Issue 本文によるプロンプトインジェクション対策）
on:
  issues:
    types: [labeled]
  # 手動再実行用（失敗時のリトライなど）
  workflow_dispatch:
    inputs:
      issue_number:
        description: "解決する Issue 番号"
        required: true
        type: string

jobs:
  resolve:
    # claude:auto ラベルが付いたときのみ実行
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'claude:auto'
    runs-on: ubuntu-latest
    # 実装を伴うため長めのタイムアウトを設定
    timeout-minutes: 45
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    # 同じ Issue に対する多重実行を防止
    concurrency:
      group: claude-resolve-issue-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # テスト実行に必要な環境をセットアップ（ci.yml と同一構成）
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # リポジトリ内の .claude/skills/resolve-issue を起動
          prompt: "/resolve-issue ${{ github.event.issue.number || inputs.issue_number }}"
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 80
