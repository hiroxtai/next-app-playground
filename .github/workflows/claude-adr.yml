name: Claude ADR

# ADR（Architecture Decision Record）自動作成ワークフロー
# PR がマージされると発火し、ADR に値する設計判断が含まれる場合のみ
# docs/adr/ に ADR を追加する PR を作成する
# （値するかどうかの判断は write-adr スキル内で行う）
on:
  pull_request:
    types: [closed]

jobs:
  adr:
    # マージされた PR のみ対象
    # - Dependabot の PR は対象外（設計判断を含まないため）
    # - ADR 自身の PR は対象外（無限ループ防止）
    if: |
      github.event.pull_request.merged == true &&
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.event.pull_request.head.ref, 'claude/adr-')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # リポジトリ内の .claude/skills/write-adr を起動
          prompt: "/write-adr ${{ github.event.pull_request.number }}"
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
